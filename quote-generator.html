<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUOTE-GENERATOR</title>
</head>
<body>

  <style>
/* 1. General Page Setup */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  /* This creates that soft blue/green gradient from the image */
 background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);

  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 2. Navigation Bar */
nav {
  padding: 20px 40px;
  background: rgba(255, 255, 255, 0.2); /* Semi-transparent */
  backdrop-filter: blur(10px);
  color: yellow; /* Bright yellow for contrast */
  text-transform: uppercase;
  letter-spacing: 1px;
}

nav h2 {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 400;
}

/* 3. The Quote Card */
.quote-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  width: 90%;
  max-width: 500px;
  margin: auto; /* Centers the card vertically and horizontally */
  text-align: center;
  /* This animation triggers when the card first loads */
  animation: slideUp 0.8s ease-out;
}

#quoteText {
  font-size: 1.8rem;
  color: #333;
  font-style: italic;
  margin-bottom: 10px;
  line-height: 1.4;
}

#quoteAuthor {
  font-size: 1rem;
  color: #777;
  display: block;
  margin-bottom: 25px;
}

/* 4. The Professional Button */
button {
  background-color: #4a90e2;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 1rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
}

button:hover {
  background-color: #357abd;
  transform: translateY(-2px); /* Lifts the button slightly */
  box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
}

button:active {
  transform: translateY(0);
}

/* 5. Animations */
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Animation for when text changes */
.fade-in {
  animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

footer {
  text-align: center;
  padding: 20px;
  color: rgba(255, 255, 255, 0.7); /* Light white to match your dark background */
  font-size: 0.9rem;
  margin-top: auto; /* Pushes the footer to the bottom of the screen */
}

footer a {
  color: #4a90e2; /* A nice blue for your link */
  text-decoration: none;
  font-weight: bold;
}

footer a:hover {
  text-decoration: underline;
}


</style>
  <nav>
  <h2>Daily Insight | Your Inspiring Quote</h2>
</nav>


<div class="quote-card">
  <p id="quoteText">"Click the button to get inspired!"</p>
  <small id="quoteAuthor"></small>
  
  <br>
  
  
  <button onclick="generateQuote()">Generate New Quote</button>
</div>
<footer>
  <p>Powered by <a href="https://youtube.com" target="_blank">CodeRise Hub</a></p>
  <p id="currentDate"></p>
</footer>

<script>
const quotes = [
  { text: "Code is like humor. When you have to explain it, it’s bad.", author: "Cory House" },
  { text: "Fix the cause, not the symptom.", author: "Steve Maguire" },
  { text: "Simplicity is the soul of efficiency.", author: "Austin Freeman" },
  { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle Onassis" },
  { text: "We can easily forgive a child who is afraid of the dark; the real tragedy of life is when men are afraid of the light.", author: "Plato" },
  { text: "Success is not final; failure is not fatal: It is the courage to continue that counts.", author: "Winston Churchill" },
  { text: "Keep your face towards the sunshine and shadows will fall behind you.", author: "Walt Whitman" },
  { text: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
  { text: "The way to right wrongs is to turn the light of truth upon them.", author: "Ida B. Wells" },
  { text: "Success is falling nine times and getting up ten.", author: "Jon Bon Jovi" },
  { text: "Imagination is more important than knowledge.", author: "Albert Einstein" },
  { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
  { text: "If you want to find the secrets of the universe, think in terms of energy, frequency and vibration.", author: "Nikola Tesla" },
  { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
  { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
  { text: "The best way to predict the future is to invent it.", author: "Alan Kay" },
  { text: "The only limit to our realization of tomorrow will be our doubts of today.", author: "Franklin D. Roosevelt" },
  { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
  { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
  { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
  { text: "To love beauty is to see light.", author: "Victor Hugo" },
  { text: "When you are loaded you will be needed.", author: "Akerele Emmanuel" },
  {text: "Trust the process", author: "Akerele Emmanuel"}
];

// 2. The Function
function generateQuote() {
  // Use Math.random to pick a random index from the array
  const randomIndex = Math.floor(Math.random() * quotes.length);
  
  // 3. Variables to hold the selected object
  const selectedQuote = quotes[randomIndex];

  // 4. Update the HTML page with the object properties
  document.getElementById("quoteText").innerText = `"${selectedQuote.text}"`;
  document.getElementById("quoteAuthor").innerText = `— ${selectedQuote.author}`;
}

</script>
</body>
</html>
